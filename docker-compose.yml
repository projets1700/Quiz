# Nom de projet fixe : évite la pile « app-* » qui mélange d’anciens conteneurs (ex. app-postgres-1 sur 5432).
name: quiz-mvp

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: quiz
      POSTGRES_PASSWORD: quiz_secret
      POSTGRES_DB: quiz_app
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/script_quiz.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    # Pas de ports sur l’hôte : le backend joint « db:5432 » dans le réseau Docker → aucun conflit avec PostgreSQL local sur 5432.
    # Pour accéder à la base depuis Windows (DBeaver) : décommenter la ligne suivante (ou utiliser un port libre, ex. 5433).
    # ports:
    #   - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quiz -d quiz_app"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: quiz_app
      DB_USER: quiz
      DB_PASSWORD: quiz_secret
      JWT_SECRET: ${JWT_SECRET:-changez-moi-en-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      APP_URL: ${APP_URL:-http://localhost}
      API_URL: ${API_URL:-http://localhost}
      MOCK_EMAIL: ${MOCK_EMAIL:-true}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  backend_uploads:
